<svg viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="0" y="0" width="1280" height="640" fill="#060F20"/>

  <!-- Subtle grid lines -->
  <g stroke="#0D2040" stroke-width="0.8" opacity="0.6">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Large orbital logo (left side) -->
  <g transform="translate(220, 320)">
    <circle cx="0" cy="0" r="185" fill="#070E1C"/>
    <!-- Ring 1 -->
    <ellipse cx="0" cy="0" rx="140" ry="38" fill="none" stroke="#3B82F6" stroke-width="3.5" transform="rotate(8)"/>
    <!-- Ring 2 -->
    <ellipse cx="0" cy="0" rx="140" ry="38" fill="none" stroke="#60A5FA" stroke-width="2.8" transform="rotate(68)"/>
    <!-- Ring 3 -->
    <ellipse cx="0" cy="0" rx="140" ry="38" fill="none" stroke="#93C5FD" stroke-width="2.2" transform="rotate(-52)"/>
    <!-- Orbital nodes -->
    <circle cx="137" cy="22"  r="7"   fill="#3B82F6"/>
    <circle cx="73"  cy="-127" r="6"   fill="#60A5FA"/>
    <circle cx="-120" cy="-77" r="5.5" fill="#93C5FD"/>
    <!-- Nucleus -->
    <circle cx="0" cy="0" r="20"  fill="#1D4ED8" opacity="0.9"/>
    <circle cx="0" cy="0" r="11"  fill="#60A5FA"/>
    <circle cx="0" cy="0" r="5.5" fill="#DBEAFE"/>
    <!-- Border -->
    <circle cx="0" cy="0" r="184" fill="none" stroke="#1D4ED8" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Right side: text content -->
  <!-- Project name -->
  <text x="490" y="185" font-family="monospace" font-size="88" font-weight="bold" fill="#FFFFFF" letter-spacing="-2">MicroWorld</text>

  <!-- Divider line -->
  <line x1="490" y1="210" x2="1240" y2="210" stroke="#1D4ED8" stroke-width="1.5" opacity="0.7"/>

  <!-- Tagline CN -->
  <text x="490" y="255" font-family="monospace" font-size="22" fill="#93C5FD">第一個為量化金融打造的世界模型架構</text>
  <!-- Tagline EN -->
  <text x="490" y="290" font-family="monospace" font-size="19" fill="#60A5FA">The first world model architecture for quantitative finance</text>

  <!-- Key properties -->
  <text x="490" y="350" font-family="monospace" font-size="16" fill="#4B5563">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>

  <text x="490" y="385" font-family="monospace" font-size="17" fill="#E2E8F0">
    <tspan fill="#3B82F6">L0</tspan> Cross-market capital flow game
    <tspan dx="30" fill="#818CF8">L1</tspan> Multi-population institution-type MFG
  </text>
  <text x="490" y="415" font-family="monospace" font-size="17" fill="#E2E8F0">
    <tspan fill="#A78BFA">L2</tspan> Individual institution Nash competition
    <tspan dx="30" fill="#22C55E">L3</tspan> Intra-institution mixed MFC/MFG
  </text>

  <text x="490" y="450" font-family="monospace" font-size="16" fill="#4B5563">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>

  <!-- Key guarantees -->
  <text x="490" y="482" font-family="monospace" font-size="15" fill="#6B7280">
    ✓ Unique Nash equilibrium at every level   ✓ W₂ ≤ Cρⁿ convergence proof
  </text>
  <text x="490" y="504" font-family="monospace" font-size="15" fill="#6B7280">
    ✓ Topological groupoid event algebra       ✓ Lyapunov crisis early-warning
  </text>
  <text x="490" y="526" font-family="monospace" font-size="15" fill="#6B7280">
    ✓ Information hierarchy (SNR stratified)   ✓ Meta-prediction: predict the predictor
  </text>

  <!-- Bottom: attribution -->
  <line x1="490" y1="560" x2="1240" y2="560" stroke="#0D2040" stroke-width="1"/>
  <text x="490" y="590" font-family="monospace" font-size="15" fill="#374151">Alpha Flow Research  ·  HongJin HE  ·  HKUST / Stanford IHP  ·  2026</text>
  <text x="490" y="612" font-family="monospace" font-size="14" fill="#1D4ED8">github.com/hongjin-he/World-Model-For-Quant-Company</text>

  <!-- Top-right: equation teaser -->
  <text x="1240" y="60" font-family="monospace" font-size="13" fill="#1D4ED8" text-anchor="end" opacity="0.8">P(t) = ∫∫∫∫ α*(y,x,ξ,Γ) · μ⁽³⁾ · μ⁽²⁾ · μ⁽¹⁾ · ν⁽⁰⁾</text>
  <text x="1240" y="82" font-family="monospace" font-size="13" fill="#1D4ED8" text-anchor="end" opacity="0.6">dξ^(m,τ) = b₁(ξ, μ¹, Γᵐ, π) dt + σ₁ dW</text>
  <text x="1240" y="104" font-family="monospace" font-size="13" fill="#1D4ED8" text-anchor="end" opacity="0.4">RI(t) = ℒV(S_t) &gt; 0  ⟹  crisis</text>
</svg>
