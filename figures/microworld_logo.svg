<svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="gc2"><circle cx="160" cy="160" r="110"/></clipPath>
    <clipPath id="bezel"><circle cx="160" cy="160" r="152"/></clipPath>
  </defs>

  <!-- Deep space bg -->
  <circle cx="160" cy="160" r="158" fill="#040912"/>

  <!-- Outer bezel ring with tick marks -->
  <circle cx="160" cy="160" r="148" fill="none" stroke="#0F2952" stroke-width="10"/>
  <circle cx="160" cy="160" r="148" fill="none" stroke="#1E3F7A" stroke-width="0.6"/>
  <circle cx="160" cy="160" r="153" fill="none" stroke="#0F2952" stroke-width="0.5"/>

  <!-- Bezel tick marks every 30° -->
  <g stroke="#22D3EE" stroke-width="1.5" stroke-opacity="0.7">
    <line x1="160" y1="12"  x2="160" y2="22"  transform="rotate(0   160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="19"  transform="rotate(30  160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="19"  transform="rotate(60  160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="22"  transform="rotate(90  160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="19"  transform="rotate(120 160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="19"  transform="rotate(150 160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="22"  transform="rotate(180 160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="19"  transform="rotate(210 160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="19"  transform="rotate(240 160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="22"  transform="rotate(270 160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="19"  transform="rotate(300 160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="19"  transform="rotate(330 160 160)"/>
  </g>
  <!-- Fine ticks every 10° -->
  <g stroke="#22D3EE" stroke-width="0.7" stroke-opacity="0.35">
    <line x1="160" y1="12"  x2="160" y2="16" transform="rotate(10  160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="16" transform="rotate(20  160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="16" transform="rotate(40  160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="16" transform="rotate(50  160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="16" transform="rotate(70  160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="16" transform="rotate(80  160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="16" transform="rotate(100 160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="16" transform="rotate(110 160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="16" transform="rotate(130 160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="16" transform="rotate(140 160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="16" transform="rotate(160 160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="16" transform="rotate(170 160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="16" transform="rotate(190 160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="16" transform="rotate(200 160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="16" transform="rotate(220 160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="16" transform="rotate(230 160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="16" transform="rotate(250 160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="16" transform="rotate(260 160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="16" transform="rotate(280 160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="16" transform="rotate(290 160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="16" transform="rotate(310 160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="16" transform="rotate(320 160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="16" transform="rotate(340 160 160)"/>
    <line x1="160" y1="12"  x2="160" y2="16" transform="rotate(350 160 160)"/>
  </g>

  <!-- Globe body -->
  <circle cx="160" cy="160" r="110" fill="#071428"/>

  <!-- Globe lat/lon grid -->
  <g clip-path="url(#gc2)" fill="none" stroke="#1D4ED8" stroke-opacity="0.30">
    <ellipse cx="160" cy="160" rx="110" ry="32"  stroke-width="0.6"/>
    <ellipse cx="160" cy="128" rx="88"  ry="23"  stroke-width="0.45"/>
    <ellipse cx="160" cy="192" rx="88"  ry="23"  stroke-width="0.45"/>
    <ellipse cx="160" cy="97"  rx="52"  ry="14"  stroke-width="0.35"/>
    <ellipse cx="160" cy="223" rx="52"  ry="14"  stroke-width="0.35"/>
    <ellipse cx="160" cy="160" rx="32"  ry="110" stroke-width="0.6"/>
    <ellipse cx="160" cy="160" rx="88"  ry="110" stroke-width="0.45"/>
    <line x1="160" y1="50" x2="160" y2="270" stroke-width="0.45"/>
  </g>

  <!-- Agent network inside globe -->
  <g clip-path="url(#gc2)">
    <g fill="none" stroke="#06B6D4" stroke-width="0.8" stroke-opacity="0.4">
      <line x1="160" y1="160" x2="118" y2="136"/>
      <line x1="160" y1="160" x2="203" y2="141"/>
      <line x1="160" y1="160" x2="206" y2="185"/>
      <line x1="160" y1="160" x2="122" y2="190"/>
      <line x1="160" y1="160" x2="163" y2="215"/>
      <line x1="118" y1="136" x2="90"  y2="158"/>
      <line x1="118" y1="136" x2="148" y2="106"/>
      <line x1="203" y1="141" x2="232" y2="126"/>
      <line x1="206" y1="185" x2="232" y2="126"/>
      <line x1="206" y1="185" x2="220" y2="210"/>
      <line x1="122" y1="190" x2="88"  y2="204"/>
      <line x1="148" y1="106" x2="192" y2="96"/>
      <line x1="192" y1="96"  x2="232" y2="126"/>
    </g>
    <g fill="#0EA5E9" opacity="0.55">
      <circle cx="90"  cy="158" r="2.8"/>
      <circle cx="148" cy="106" r="2.8"/>
      <circle cx="192" cy="96"  r="2.8"/>
      <circle cx="232" cy="126" r="3.2"/>
      <circle cx="220" cy="210" r="2.8"/>
      <circle cx="88"  cy="204" r="2.8"/>
    </g>
    <g fill="#22D3EE">
      <circle cx="118" cy="136" r="5"  opacity="0.95"/>
      <circle cx="203" cy="141" r="5"  opacity="0.95"/>
      <circle cx="206" cy="185" r="5"  opacity="0.95"/>
      <circle cx="122" cy="190" r="4.5" opacity="0.90"/>
      <circle cx="163" cy="215" r="4"  opacity="0.85"/>
    </g>
    <!-- Globe shine top-left -->
    <ellipse cx="118" cy="100" rx="40" ry="24" fill="white" fill-opacity="0.04"/>
  </g>

  <!-- Globe rim -->
  <circle cx="160" cy="160" r="110" fill="none" stroke="#2563EB" stroke-width="1.4" opacity="0.7"/>

  <!-- CROSSHAIR — the distinctive element -->
  <!-- Outer arms (outside globe, full opacity) -->
  <g clip-path="url(#bezel)" stroke="#06B6D4" stroke-opacity="0.75" fill="none">
    <line x1="8"   y1="160" x2="50"  y2="160" stroke-width="1.2"/>
    <line x1="270" y1="160" x2="312" y2="160" stroke-width="1.2"/>
    <line x1="160" y1="8"   x2="160" y2="50"  stroke-width="1.2"/>
    <line x1="160" y1="270" x2="160" y2="312" stroke-width="1.2"/>
    <!-- Inner arms (inside globe, ghost) -->
    <line x1="50"  y1="160" x2="120" y2="160" stroke-width="0.6" stroke-opacity="0.3"/>
    <line x1="200" y1="160" x2="270" y2="160" stroke-width="0.6" stroke-opacity="0.3"/>
    <line x1="160" y1="50"  x2="160" y2="120" stroke-width="0.6" stroke-opacity="0.3"/>
    <line x1="160" y1="200" x2="160" y2="270" stroke-width="0.6" stroke-opacity="0.3"/>
  </g>

  <!-- Crosshair end-caps -->
  <g fill="#22D3EE" opacity="0.9">
    <rect x="5"   y="158" width="6" height="4" rx="1"/>
    <rect x="309" y="158" width="6" height="4" rx="1"/>
    <rect x="158" y="5"   width="4" height="6" rx="1"/>
    <rect x="158" y="309" width="4" height="6" rx="1"/>
  </g>

  <!-- Crosshair mid-arm tick marks -->
  <g stroke="#22D3EE" stroke-width="1" stroke-opacity="0.6" fill="none">
    <line x1="75"  y1="156" x2="75"  y2="164"/>
    <line x1="100" y1="157" x2="100" y2="163"/>
    <line x1="245" y1="156" x2="245" y2="164"/>
    <line x1="220" y1="157" x2="220" y2="163"/>
    <line x1="156" y1="75"  x2="164" y2="75"/>
    <line x1="157" y1="100" x2="163" y2="100"/>
    <line x1="156" y1="245" x2="164" y2="245"/>
    <line x1="157" y1="220" x2="163" y2="220"/>
  </g>

  <!-- Central equilibrium ring -->
  <circle cx="160" cy="160" r="14" fill="none" stroke="#22D3EE" stroke-width="1.2" stroke-opacity="0.7"/>
  <circle cx="160" cy="160" r="7"  fill="#1D4ED8" opacity="0.9"/>
  <circle cx="160" cy="160" r="3.5" fill="#BFDBFE"/>

  <!-- Level indicator rings -->
  <circle cx="160" cy="160" r="82"  fill="none" stroke="#818CF8" stroke-width="0.9" stroke-opacity="0.40" stroke-dasharray="5,4"/>
  <circle cx="160" cy="160" r="128" fill="none" stroke="#A78BFA" stroke-width="0.9" stroke-opacity="0.35" stroke-dasharray="3,5"/>

  <!-- Corner bracket marks (precision instrument) -->
  <g stroke="#22D3EE" stroke-width="1.5" fill="none" stroke-opacity="0.6">
    <polyline points="32,46  32,32  46,32"/>
    <polyline points="274,32 288,32 288,46"/>
    <polyline points="32,274 32,288 46,288"/>
    <polyline points="288,274 288,288 274,288"/>
  </g>

</svg>
