<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background disc -->
  <circle cx="100" cy="100" r="98" fill="#060F20"/>

  <!-- Three orbital rings at 0°, 60°, -52° -->
  <ellipse cx="100" cy="100" rx="74" ry="20"
    fill="none" stroke="#3B82F6" stroke-width="1.8"
    transform="rotate(8, 100, 100)"/>
  <ellipse cx="100" cy="100" rx="74" ry="20"
    fill="none" stroke="#60A5FA" stroke-width="1.4"
    transform="rotate(68, 100, 100)"/>
  <ellipse cx="100" cy="100" rx="74" ry="20"
    fill="none" stroke="#93C5FD" stroke-width="1.1"
    transform="rotate(-52, 100, 100)"/>

  <!-- One orbital node per ring -->
  <circle cx="172" cy="103" r="3.5" fill="#3B82F6"/>
  <circle cx="138" cy="39"  r="3"   fill="#60A5FA"/>
  <circle cx="40"  cy="62"  r="3"   fill="#93C5FD"/>

  <!-- Central nucleus -->
  <circle cx="100" cy="100" r="9"   fill="#1D4ED8" opacity="0.9"/>
  <circle cx="100" cy="100" r="5"   fill="#60A5FA"/>
  <circle cx="100" cy="100" r="2.5" fill="#DBEAFE"/>

  <!-- Outer border -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="#1D4ED8" stroke-width="0.6" opacity="0.5"/>
</svg>
